driver="local"
jwt_secret="test-secret-for-local-storage-testing"

# Optional client IP subnets to reject. List multiple IPv4 or IPv6 CIDRs in
# one TOML array. Use /32 (IPv4) or /128 (IPv6) to block a single address.
#block_subnets = ["192.0.2.0/24", "198.51.100.0/24", "2001:db8::/32"]

# Optional browser download challenge. If this section is absent, or
# user_agents is empty, the feature is disabled. Keep secure_cookie=true in
# production; false is useful only for local plain-HTTP development.
#[download_challenge]
#user_agents = ["android"]
#secret = "replace-with-an-independent-random-secret-of-at-least-32-characters"
#cookie_ttl_seconds = 600
#ipv4_prefix_length = 24
#ipv6_prefix_length = 64
#fallback_bytes_per_second = 262144
#secure_cookie = true

[local]
storage_path="./test-storage"

[cache]
cleanup_chunk_size=100000

# A built-in list already blocks lesser search-engine crawlers (Yandex, Baidu,
# DuckDuckGo, Yahoo, Sogou, ...), AI scrapers, and SEO crawlers (AhrefsBot,
# SemrushBot, MJ12bot, ...), while always allowing Google and Microsoft
# (Bing/MSN). Optionally extend or disable it below. Restart to apply changes.
#[useragent]
#ban = ["SomeOtherBot", "AnotherScraper"]  # extra substrings to ban
#defaults = true                            # set false to drop the built-in list

# Optional: tag all new uploads so backend lifecycle rules can expire them
#[retention]
#tag_key = "retention"  # optional, defaults to "retention"
#tag_value = "6m"
